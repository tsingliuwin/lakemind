<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>LakeMind</title>
    <style>
      /* First-paint background — inline so the dark canvas shows immediately,
         before the JS bundle loads and App.css is injected. Matches --bg-base. */
      html, body, #root {
        margin: 0;
        height: 100%;
        background-color: #0a0a0b;
        color: #e6e7eb;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background-color: #0a0a0b;
      }
      .app-splash__logo {
        width: 56px;
        height: 56px;
        opacity: 0.92;
      }
      .app-splash__spinner {
        width: 22px;
        height: 22px;
        border: 2px solid rgba(230, 231, 235, 0.18);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Replaced once Solid renders. Inlined so there's never a blank frame. -->
      <div class="app-splash" aria-label="正在加载 LakeMind">
        <img class="app-splash__logo" src="/logo_white.png" alt="" />
        <div class="app-splash__spinner"></div>
      </div>
    </div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
