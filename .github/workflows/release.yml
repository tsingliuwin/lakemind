name: Release

# 触发条件：推送 v* 形式的 tag，或者手动运行工作流
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_level:
        description: 'Release level (small, medium, large)'
        required: true
        default: 'small'
        type: choice
        options:
          - small
          - medium
          - large
      tag_name:
        description: 'Release tag name (e.g. v0.2.1)'
        required: true
        default: 'v0.2.1'

# 顶层权限：允许写 contents 以提交修改和发布 Release。
permissions:
  contents: write

jobs:
  # 准备阶段：解析版本并动态生成构建矩阵
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      tag_name: ${{ steps.set-matrix.outputs.tag_name }}
    steps:
      - name: Determine Release Settings
        id: set-matrix
        run: |
          # 确定 tag 名称
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          # 确定发布级别
          LEVEL=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LEVEL="${{ github.event.inputs.release_level }}"
          else
            # 从 tag 解析（例如 v0.2.1 -> 0.2.1）
            VERSION="${TAG_NAME#v}"
            if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
            else
              # 无法解析时的降级策略
              MAJOR=0
              MINOR=0
              PATCH=1
            fi
            
            if [ "$PATCH" -ne "0" ]; then
              LEVEL="small"
            elif [ "$MINOR" -ne "0" ] || [ "$MAJOR" -eq "0" ]; then
              LEVEL="medium"
            else
              LEVEL="large"
            fi
          fi
          
          echo "Level: $LEVEL for Tag: $TAG_NAME"
          
          # 根据级别生成 Matrix JSON
          if [ "$LEVEL" = "small" ]; then
            # 小版本：只构建常用 Win (.exe), Mac ARM64 (.dmg)
            MATRIX='{"settings":[{"os":"windows-latest","args":"","target":"","level":"small"},{"os":"macos-latest","args":"--target aarch64-apple-darwin","target":"aarch64-apple-darwin","level":"small"}]}'
          elif [ "$LEVEL" = "medium" ]; then
            # 中版本：只构建常用 Win (.exe), Mac ARM64 (.dmg)
            MATRIX='{"settings":[{"os":"windows-latest","args":"","target":"","level":"medium"},{"os":"macos-latest","args":"--target aarch64-apple-darwin","target":"aarch64-apple-darwin","level":"medium"}]}'
          else
            # 大版本：全平台、全架构
            MATRIX='{"settings":[{"os":"windows-latest","args":"","target":"","level":"large"},{"os":"macos-latest","args":"--target aarch64-apple-darwin","target":"aarch64-apple-darwin","level":"large"},{"os":"macos-latest","args":"--target x86_64-apple-darwin","target":"x86_64-apple-darwin","level":"large"},{"os":"ubuntu-22.04","args":"","target":"","level":"large"}]}'
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  # 构建阶段：使用动态矩阵进行编译打包
  build:
    name: Build (${{ matrix.settings.os }} ${{ matrix.settings.args }})
    needs: prepare
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Optimize Tauri config for small release
        if: matrix.settings.level == 'small'
        run: |
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (process.platform === 'win32') {
              conf.bundle.targets = ['nsis'];
            } else if (process.platform === 'darwin') {
              conf.bundle.targets = ['app', 'dmg'];
            }
            fs.writeFileSync(path, JSON.stringify(conf, null, 2), 'utf8');
            console.log('Tauri config optimized for small release:', conf.bundle.targets);
          "

      - name: Install Linux dependencies
        if: matrix.settings.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the updater packages so the in-app updater can verify them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag_name }}
          releaseName: "${{ needs.prepare.outputs.tag_name }}"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.settings.args }}

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        shell: bash
        run: |
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          mkdir -p updater-sigs

          # 每个平台有两类产物：
          #   1) 安装包（dmg/exe/AppImage）—— 供用户手动下载安装
          #   2) updater 产物 + .sig 签名 —— 供应用内自动更新校验
          # macOS 的 updater 产物是 .app.tar.gz（不是 dmg），Windows/Linux
          # 的 updater 产物就是安装包本身。latest.json 的 url/sig 指向后者。

          if [ "${{ matrix.settings.os }}" = "windows-latest" ]; then
            # --- Windows (nsis) ---
            INST_PATH=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" 2>/dev/null | head -n 1)
            INST_NAME="lakemind-${TAG_NAME}.exe"
            # updater 用同一个 exe + 它的 .sig
            UP_PATH="$INST_PATH"; UP_NAME="$INST_NAME"
            UP_SIG_PATH="${INST_PATH}.sig"; UP_SIG_NAME="${INST_NAME}.sig"
          elif [ "${{ matrix.settings.os }}" = "macos-latest" ]; then
            if [[ "${{ matrix.settings.args }}" == *"--target x86_64-apple-darwin"* ]]; then
              INST_PATH=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
              INST_NAME="lakemind-${TAG_NAME}-x64.dmg"
              # updater 用 macos/ 下的 app.tar.gz（不是 dmg）
              UP_PATH=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app.tar.gz" 2>/dev/null | head -n 1)
              UP_NAME="lakemind-${TAG_NAME}-x64.app.tar.gz"
            else
              INST_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
              INST_NAME="lakemind-${TAG_NAME}-arm64.dmg"
              UP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app.tar.gz" 2>/dev/null | head -n 1)
              UP_NAME="lakemind-${TAG_NAME}-arm64.app.tar.gz"
            fi
            UP_SIG_PATH="${UP_PATH}.sig"; UP_SIG_NAME="${UP_NAME}.sig"
          elif [ "${{ matrix.settings.os }}" = "ubuntu-22.04" ]; then
            # --- Linux (AppImage) ---
            INST_PATH=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -n 1)
            INST_NAME="lakemind-${TAG_NAME}.AppImage"
            UP_PATH="$INST_PATH"; UP_NAME="$INST_NAME"
            UP_SIG_PATH="${INST_PATH}.sig"; UP_SIG_NAME="${INST_NAME}.sig"
          fi

          # 1) 上传安装包（dmg/exe/AppImage）
          if [ -n "$INST_PATH" ] && [ -f "$INST_PATH" ]; then
            echo "Uploading installer $INST_PATH -> $INST_NAME"
            aws s3 cp "$INST_PATH" "s3://lakemind/$INST_NAME" --endpoint-url ${{ secrets.R2_ENDPOINT }}
          else
            echo "::warning::Installer not found at $INST_PATH"
          fi

          # 2) 上传 updater 产物（macOS 是 app.tar.gz；Win/Linux 与安装包相同）
          if [ -n "$UP_PATH" ] && [ -f "$UP_PATH" ] && [ "$UP_PATH" != "$INST_PATH" ]; then
            echo "Uploading updater artifact $UP_PATH -> $UP_NAME"
            aws s3 cp "$UP_PATH" "s3://lakemind/$UP_NAME" --endpoint-url ${{ secrets.R2_ENDPOINT }}
          fi

          # 3) 上传 updater 签名 + 收集到 artifact 供 latest.json 生成
          if [ -n "$UP_SIG_PATH" ] && [ -f "$UP_SIG_PATH" ]; then
            echo "Uploading signature $UP_SIG_PATH -> $UP_SIG_NAME"
            aws s3 cp "$UP_SIG_PATH" "s3://lakemind/$UP_SIG_NAME" --endpoint-url ${{ secrets.R2_ENDPOINT }}
            cp "$UP_SIG_PATH" "updater-sigs/$UP_SIG_NAME"
          else
            echo "::error::Updater signature not found at '$UP_SIG_PATH'."
            echo "::error::This usually means the TAURI_SIGNING_PRIVATE_KEY secret is missing,"
            echo "::error::malformed, or failed to decode (e.g. trailing characters / not pure base64)."
            echo "::error::Re-copy the private key value exactly: cat ~/.tauri/lakemind.key"
          fi

      - name: Upload updater signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-sig-${{ matrix.settings.os }}-${{ matrix.settings.target }}
          path: updater-sigs/*.sig
          if-no-files-found: error
          retention-days: 7

  # 自动化更新官网配置并提交
  # 始终运行（即使部分平台构建失败），latest.json 只会包含成功生成签名
  # 的平台，因此不会出现签名缺失导致校验失败的情况。
  update-website-config:
    name: Update Website Config
    needs: [prepare, build]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download updater signatures
        uses: actions/download-artifact@v4
        with:
          path: updater-sigs
          pattern: updater-sig-*
          merge-multiple: true

      - name: Generate latest.json + update update.json
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const tag = process.env.TAG_NAME;
            const version = tag.replace(/^v/, "");
            const downloadBase = "https://upload.xi-n.com";

            // sig 文件名 → Tauri 平台键 + updater 下载 url 的映射。
            // 注意：macOS updater 下载的是 .app.tar.gz（不是 dmg），其 sig
            // 文件名也是 *.app.tar.gz.sig。
            const FILE_TO_PLATFORM = [
              { re: /-arm64\.app\.tar\.gz\.sig$/, platform: "darwin-aarch64", file: `lakemind-${tag}-arm64.app.tar.gz` },
              { re: /-x64\.app\.tar\.gz\.sig$/, platform: "darwin-x86_64", file: `lakemind-${tag}-x64.app.tar.gz` },
              { re: /\.exe\.sig$/, platform: "windows-x86_64", file: `lakemind-${tag}.exe` },
              { re: /\.AppImage\.sig$/, platform: "linux-x86_64", file: `lakemind-${tag}.AppImage` },
            ];

            // 收集所有下载到的 .sig 文件
            const sigDir = "updater-sigs";
            const platforms = {};
            if (fs.existsSync(sigDir)) {
              for (const dir of fs.readdirSync(sigDir)) {
                const full = path.join(sigDir, dir);
                // merge-multiple 后 .sig 可能直接在 updater-sigs 下，也可能在子目录
                const entries = fs.statSync(full).isDirectory() ? fs.readdirSync(full).map(f => path.join(full, f)) : [full];
                for (const f of entries) {
                  if (!f.endsWith(".sig")) continue;
                  const name = path.basename(f);
                  const match = FILE_TO_PLATFORM.find(m => m.re.test(name));
                  if (!match) { console.warn("No platform mapping for", name); continue; }
                  const signature = fs.readFileSync(f, "utf8").trim();
                  platforms[match.platform] = { signature, url: `${downloadBase}/${match.file}` };
                  console.log("Mapped", name, "->", match.platform);
                }
              }
            }

            // changelog：沿用现有 update.json 里的内容，保持手填更新说明的连续性
            let notes = "";
            const updateJsonPath = "site/docs/public/update.json";
            if (fs.existsSync(updateJsonPath)) {
              try { notes = JSON.parse(fs.readFileSync(updateJsonPath, "utf8")).changelog || ""; } catch {}
            }

            // 生成 Tauri 标准 latest.json（仅当至少有一个平台签名时才写入，
            // 避免发布一个空 platforms 的 manifest 让客户端误判为无更新或报错）
            if (Object.keys(platforms).length === 0) {
              console.warn("No signed platforms found — skipping latest.json generation.");
              process.exit(0);
            }
            const latest = {
              version,
              notes,
              pubdate: new Date().toISOString(),
              platforms,
            };
            fs.writeFileSync("site/docs/public/latest.json", JSON.stringify(latest, null, 2) + "\n", "utf8");
            console.log("Wrote latest.json with platforms:", Object.keys(platforms).join(", "));

            // 同步更新旧版 update.json（向后兼容 v0.3.0 旧客户端）
            const conf = fs.existsSync(updateJsonPath) ? JSON.parse(fs.readFileSync(updateJsonPath, "utf8")) : {};
            conf.version = tag;
            conf.url = downloadBase + "/";
            fs.writeFileSync(updateJsonPath, JSON.stringify(conf, null, 2) + "\n", "utf8");
            console.log("Updated update.json to version", tag);
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # latest.json 可能因无签名而未生成，单独 add 避免报错
          git add site/docs/public/latest.json 2>/dev/null || true
          git add site/docs/public/update.json
          git commit -m "chore: release ${{ needs.prepare.outputs.tag_name }} [skip ci]" || echo "No changes to commit"
          git push origin main

  publish-release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [prepare, build, update-website-config]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Build matrix finished with status: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::warning::部分平台构建失败，请到 Actions 页面查看详情。"
          fi
