name: CI Cache Warmer

on:
  push:
    branches:
      - main
    # 只在 Cargo.lock（Rust 依赖）或 package-lock.json（npm 依赖）变化时预热，
    # 确保缓存 key 与后续 Release 构建完全一致，从而真正提速。
    paths:
      - "src-tauri/Cargo.lock"
      - "package-lock.json"

jobs:
  warm-cache:
    name: Warm Build Cache (${{ matrix.os }})
    # 发版 commit（chore: bump version）会同时触发 Release workflow 来完整构建，
    # 此时跳过 Cache Warmer 避免重复占用 CI 资源。
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 同时预热 arm64 和 x64 的依赖缓存
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      # 在 main 分支只做编译（不进行打包），从而生成并缓存 release 模式的依赖包中间产物
      - name: Compile Rust Dependencies (Release)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cd src-tauri
            cargo build --release --target aarch64-apple-darwin
            cargo build --release --target x86_64-apple-darwin
          else
            cd src-tauri
            cargo build --release
          fi
