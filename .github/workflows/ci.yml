name: CI Cache Warmer

on:
  workflow_dispatch:  # 手动触发预热
  push:
    branches:
      - main
    # 只在 Cargo.lock（Rust 依赖）或 package-lock.json（npm 依赖）变化时预热，
    # 确保缓存 key 与后续 Release 构建完全一致，从而真正提速。
    paths:
      - "src-tauri/Cargo.lock"
      - "package-lock.json"

jobs:
  warm-cache:
    name: Warm Build Cache (${{ matrix.os }} ${{ matrix.target }})
    # 发版 commit（chore: bump version）会同时触发 Release workflow 来完整构建，
    # 此时跳过 Cache Warmer 避免重复占用 CI 资源。
    # 注意：workflow_dispatch 触发时 head_commit 为 null，需要额外判断。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 每个 target 独立一个 job，确保缓存 key 和 Release 矩阵一一对应
          - os: windows-latest
            target: ""
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # shared-key 必须和 release.yml 中完全一致，这样 Release 构建就能
          # 直接命中 CI 预热的缓存，跳过依赖编译。
          shared-key: "tauri-${{ matrix.os }}-${{ matrix.target }}"
          save-if: "true"
          cache-on-failure: "true"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      # 在 main 分支只做编译（不进行打包），从而生成并缓存 release 模式的依赖包中间产物
      - name: Compile Rust Dependencies (Release)
        shell: bash
        run: |
          cd src-tauri
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release
          fi
